---
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev --health-enabled=true
    restart: unless-stopped
    environment:
      TZ: "Europe/Warsaw"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./data:/opt/keycloak/data

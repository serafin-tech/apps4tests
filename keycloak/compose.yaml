---
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev --health-enabled=true --import-realm
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "Europe/Warsaw"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    volumes:
      - ./data:/opt/keycloak/data
      - ./realm-import:/opt/keycloak/data/import:ro

  flask-app:
    build: ./flask-app
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "Europe/Warsaw"
